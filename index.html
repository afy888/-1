<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catalog System | All For You & We Craft</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
    :root { 
        --brand-blue: #1e3a8a; 
        --bg-gradient: linear-gradient(135deg, #f0f4f8 0%, #dbeafe 100%);
    }

    body, html { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        font-family: 'Montserrat', sans-serif; overflow: hidden; 
        background: var(--bg-gradient);
    }

    /* 粒子画布 */
    #particle-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

    .wrapper { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }

    /* 磨砂玻璃主容器 */
    .main-container { 
        background: rgba(255, 255, 255, 0.75); 
        backdrop-filter: blur(25px); 
        padding: 60px; border-radius: 40px; 
        box-shadow: 0 40px 100px rgba(0,0,0,0.12); 
        text-align: center; max-width: 900px; width: 90%; 
        border: 1px solid rgba(255,255,255,0.5);
    }

    h1 { 
        font-weight: 900; color: var(--brand-blue); 
        font-size: 42px; margin: 0 0 15px 0; 
        letter-spacing: -2px; text-transform: uppercase;
    }

    .subtitle { 
        color: #64748b; font-size: 16px; font-weight: 600; 
        margin-bottom: 50px; text-transform: capitalize;
    }

    /* 选项入口 */
    .entry-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 35px; }

    .brand-box { 
        background: #ffffff; padding: 50px 30px; border-radius: 30px; 
        text-decoration: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        border: 1px solid rgba(0,0,0,0.03); display: flex; flex-direction: column; align-items: center;
    }

    .brand-box:hover { 
        transform: translateY(-15px); border-color: var(--brand-blue); 
        box-shadow: 0 35px 70px rgba(30, 58, 138, 0.2); 
    }

    /* 品牌内部 Logo */
    .brand-icon { 
        height: 75px; margin-bottom: 25px; object-fit: contain; 
        transition: transform 0.4s ease;
    }
    
    .brand-box:hover .brand-icon { transform: scale(1.15); }

    .brand-name { font-weight: 900; color: #0f172a; font-size: 22px; text-transform: uppercase; margin-bottom: 8px; }

    .brand-tag {
        font-size: 11px; color: var(--brand-blue); font-weight: 800;
        background: #f0f7ff; padding: 6px 18px; border-radius: 25px;
    }

    .system-footer { margin-top: 60px; font-size: 12px; color: #94a3b8; font-weight: 700; letter-spacing: 1px; }
</style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="wrapper">
        <div class="main-container">
            <h1>Catalog Hub</h1>
            <div class="subtitle">Select your workstation to begin catalog generation.</div>

            <div class="entry-grid">
                <a href="afy.html" class="brand-box">
                    <img src="logo/afy_logo.jpg" class="brand-icon" onerror="this.style.opacity='0.5'">
                    <div class="brand-name">All For You</div>
                    <div class="brand-tag">Station 01</div>
                </a>

                <a href="wecraft.html" class="brand-box">
                    <img src="logo/wecraft_logo.jpg" class="brand-icon" onerror="this.style.opacity='0.5'">
                    <div class="brand-name">We Craft</div>
                    <div class="brand-tag">Station 02</div>
                </a>
            </div>

            <div class="system-footer">
                61 Willet St. Bldg. J Passaic, NJ 07055 | v2.0-2026
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1; this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25; this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX; this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0; if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = `rgba(30, 58, 138, ${this.opacity})`;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }
        function init() { for (let i = 0; i < 80; i++) particles.push(new Particle()); }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
